<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gallery Caption Editor</title>
<style>
  :root { --bg:#0e0e14; --card:#1a1a24; --line:#2a2a38; --text:#ececf4; --muted:#a0a0b0; --accent:#8b5cf6; --accent2:#ec4899; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
  header { position:sticky; top:0; z-index:10; background:rgba(14,14,20,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); padding:.9rem 1.25rem; display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:1.1rem; margin:0; background:linear-gradient(120deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  header .count { color:var(--muted); font-size:.85rem; }
  input,textarea,select { font:inherit; color:var(--text); background:#12121a; border:1px solid var(--line); border-radius:8px; padding:.5rem .6rem; }
  input:focus,textarea:focus,select:focus { outline:none; border-color:var(--accent); }
  header input[type=search], header select { min-width:180px; }
  .btn { cursor:pointer; border:none; border-radius:999px; padding:.55rem 1.3rem; font-weight:600; color:#fff; background:linear-gradient(120deg,var(--accent),var(--accent2)); }
  .btn.secondary { background:transparent; border:1px solid var(--line); color:var(--text); font-weight:500; }
  .status { font-size:.85rem; color:var(--muted); min-width:120px; }
  .status.saved { color:#4ade80; }
  .status.dirty { color:var(--accent2); }
  main { max-width:1100px; margin:0 auto; padding:1.25rem; }
  h2 { font-size:1rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:2rem 0 .75rem; }
  .card { display:grid; grid-template-columns:200px 1fr; gap:1rem; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:1rem; margin-bottom:1rem; }
  .card img { width:200px; height:130px; object-fit:cover; border-radius:8px; background:#000; }
  .card .fields { display:flex; flex-direction:column; gap:.55rem; min-width:0; }
  .card .file { font-size:.72rem; color:var(--muted); font-family:monospace; word-break:break-all; }
  .row { display:flex; gap:.55rem; }
  .row .f-title { flex:1; }
  .row .f-cat { width:190px; }
  textarea.f-desc { resize:vertical; min-height:56px; width:100%; }
  label { font-size:.72rem; color:var(--muted); display:block; margin-bottom:.15rem; }
  .vcard { display:grid; grid-template-columns:1fr auto; gap:.6rem; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:1rem; margin-bottom:.9rem; }
  .vcard .vgrid { display:grid; grid-template-columns:1fr 1fr; gap:.55rem; }
  .hint { color:var(--muted); font-size:.85rem; margin:.25rem 0 0; }
</style>
</head>
<body>
<header>
  <h1>Gallery Caption Editor</h1>
  <span class="count" id="count"></span>
  <input type="search" id="search" placeholder="Filter by name, title, or text" />
  <select id="catfilter"><option value="">All categories</option></select>
  <div style="flex:1"></div>
  <span class="status" id="status"></span>
  <button class="btn" id="save">Save</button>
</header>
<main>
  <p class="hint">Edit any field, then click Save. Changes write to <code>src/data/galleryData.json</code>. Deploy afterward to publish.</p>
  <h2>Photos (<span id="pcount">0</span>)</h2>
  <div id="photos"></div>
  <h2>Videos</h2>
  <div id="videos"></div>
  <button class="btn secondary" id="addvideo">+ Add video</button>
</main>
<datalist id="cats"></datalist>

<script>
let DATA = { photoMeta:{}, videos:[], categoryOrder:[] };
let IMAGES = [];
const $ = (s,el=document)=>el.querySelector(s);

function allCategories(){
  const set = new Set(DATA.categoryOrder);
  Object.values(DATA.photoMeta).forEach(m=>m.category && set.add(m.category));
  DATA.videos.forEach(v=>v.category && set.add(v.category));
  return [...set];
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function renderPhotos(){
  const cats = allCategories();
  $('#cats').innerHTML = cats.map(c=>`<option value="${esc(c)}">`).join('');
  $('#catfilter').innerHTML = '<option value="">All categories</option>' + cats.map(c=>`<option>${esc(c)}</option>`).join('');
  $('#pcount').textContent = IMAGES.length;
  $('#photos').innerHTML = IMAGES.map(file=>{
    const m = DATA.photoMeta[file] || {};
    return `<div class="card" data-file="${esc(file)}">
      <img loading="lazy" src="/images/${encodeURIComponent(file)}" alt="">
      <div class="fields">
        <div class="file">${esc(file)}</div>
        <div class="row">
          <div style="flex:1"><label>Title</label><input class="f-title" value="${esc(m.title)}" placeholder="(blank shows no title)"></div>
          <div><label>Category</label><input class="f-cat" list="cats" value="${esc(m.category)}" placeholder="Uncategorized"></div>
        </div>
        <div><label>Description</label><textarea class="f-desc" placeholder="Your story for this photo...">${esc(m.description)}</textarea></div>
      </div>
    </div>`;
  }).join('');
}

function videoCard(v){
  return `<div class="vcard">
    <div class="vgrid">
      <div><label>YouTube ID</label><input class="v-id" value="${esc(v.youtubeId)}" placeholder="dQw4w9WgXcQ"></div>
      <div><label>Category</label><input class="v-cat" list="cats" value="${esc(v.category)}"></div>
      <div><label>Title</label><input class="v-title" value="${esc(v.title)}"></div>
      <div><label>Description</label><input class="v-desc" value="${esc(v.description)}"></div>
    </div>
    <div style="display:flex;align-items:center"><button class="btn secondary v-remove">Remove</button></div>
  </div>`;
}
function renderVideos(){ $('#videos').innerHTML = DATA.videos.map(videoCard).join(''); }

function gather(){
  const photoMeta = {};
  document.querySelectorAll('.card').forEach(c=>{
    photoMeta[c.dataset.file] = {
      title: $('.f-title',c).value.trim(),
      description: $('.f-desc',c).value.trim(),
      category: $('.f-cat',c).value.trim() || 'Uncategorized',
    };
  });
  const videos = [];
  document.querySelectorAll('.vcard').forEach(c=>{
    const id = $('.v-id',c).value.trim();
    if(!id) return;
    videos.push({ youtubeId:id, title:$('.v-title',c).value.trim(), description:$('.v-desc',c).value.trim(), category:$('.v-cat',c).value.trim()||'Uncategorized' });
  });
  return { photoMeta, videos, categoryOrder: DATA.categoryOrder };
}

function setStatus(msg,cls){ const s=$('#status'); s.textContent=msg; s.className='status '+(cls||''); }

async function save(){
  setStatus('Saving...','');
  const payload = gather();
  const r = await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const j = await r.json();
  if(j.ok){ DATA = payload; renderPhotos(); renderVideos(); setStatus('Saved. Deploy to publish.','saved'); }
  else setStatus('Error: '+j.error,'dirty');
}

function applyFilter(){
  const q = $('#search').value.toLowerCase();
  const cat = $('#catfilter').value;
  let shown=0;
  document.querySelectorAll('.card').forEach(c=>{
    const file=c.dataset.file.toLowerCase();
    const title=$('.f-title',c).value.toLowerCase();
    const desc=$('.f-desc',c).value.toLowerCase();
    const cval=$('.f-cat',c).value;
    const matchQ = !q || file.includes(q) || title.includes(q) || desc.includes(q);
    const matchCat = !cat || cval===cat;
    const vis = matchQ && matchCat;
    c.style.display = vis?'':'none';
    if(vis) shown++;
  });
  $('#count').textContent = shown + ' shown';
}

document.addEventListener('input',(e)=>{ if(e.target.closest('.card')||e.target.closest('.vcard')) setStatus('Unsaved changes','dirty'); });
$('#search').addEventListener('input',applyFilter);
$('#catfilter').addEventListener('change',applyFilter);
$('#save').addEventListener('click',save);
$('#addvideo').addEventListener('click',()=>{ DATA.videos = gather().videos.concat({youtubeId:'',title:'',description:'',category:'Uncategorized'}); renderVideos(); setStatus('Unsaved changes','dirty'); });
document.addEventListener('click',(e)=>{ if(e.target.classList.contains('v-remove')){ const cards=[...document.querySelectorAll('.vcard')]; const i=cards.indexOf(e.target.closest('.vcard')); DATA.videos=gather().videos; DATA.videos.splice(i,1); renderVideos(); setStatus('Unsaved changes','dirty'); } });
window.addEventListener('beforeunload',(e)=>{ if($('#status').classList.contains('dirty')){ e.preventDefault(); e.returnValue=''; } });

(async function init(){
  DATA = await (await fetch('/api/data')).json();
  IMAGES = await (await fetch('/api/images')).json();
  renderPhotos(); renderVideos(); applyFilter();
  $('#count').textContent = IMAGES.length + ' photos';
})();
</script>
</body>
</html>
